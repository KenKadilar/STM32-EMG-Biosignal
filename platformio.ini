; STM32-EMG-Biosignal : PlatformIO project config
; Board: ST Nucleo-F446RE (STM32F446RET6, Cortex-M4F, FPU + DSP, bxCAN). Framework: STM32Cube HAL.

[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = stm32cube

; onboard ST-LINK over the Nucleo's Mini-USB (flash + debug, no external probe)
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200

build_flags =
    -Wall
    -mfpu=fpv4-sp-d16
    -mfloat-abi=hard
    ; -D ARM_MATH_CM4   ; only if CMSIS-DSP is adopted later

; Hard-float (Cortex-M4F + the FreeRTOS ARM_CM4F port). The flags above compile hard, but they do NOT
; reach the ststm32 LINK step, so fpu_link.py forces the link hard too. Both are required; removing
; either breaks the link ("uses VFP register arguments, firmware.elf does not").
extra_scripts = post:fpu_link.py
