; CAN_test : Arduino UNO + MCP2515 (8 MHz) bench test for the STM32-EMG-Biosignal CAN hardware.
; Validates the two CAN modules + the bus BEFORE writing any STM32 CAN code (Turkey faulty-part insurance).
;
; Two nodes from one project. Flash one env per UNO:
;   pio run -e sender   -t upload      (UNO #1 plugged in)
;   pio run -e receiver -t upload      (UNO #2 plugged in)
;   pio device monitor -e receiver     (watch frames arrive, 115200)

[env]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
lib_deps = https://github.com/coryjfowler/MCP_CAN_lib.git

[env:sender]
build_src_filter = -<*> +<sender.cpp>

[env:receiver]
build_src_filter = -<*> +<receiver.cpp>
